service: "service:LungNoduleService"

include:
  - "service.py"
  - "inference_3d.py"
  - "unet3d.py"
  - "resnet3d.py"
  - "frontend/**"
  - "preprocessing.py"
  - "checkpoints/unet3d.onnx"
  - "checkpoints/resnet3d.onnx"

python:
  lock_packages: false
  packages:
    - bentoml>=1.4
    - torch==2.2.0
    - onnxruntime>=1.15.0
    - opencv-python-headless<4.10.0
    - monai==1.3.0
    - numpy==1.26.4
    - scipy
    - pydicom
    - SimpleITK
    - connected-components-3d
    - transformers
    - matplotlib